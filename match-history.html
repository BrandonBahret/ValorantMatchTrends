<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAL STATS · Match History</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="match_history.js"></script>
<style>
/* ── RESET / BASE ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:    #080d14;
  --bg2:   #0c1520;
  --bg3:   #101c2a;
  --panel: #0a1219;
  --border: rgba(30,60,90,.5);
  --border-bright: rgba(60,100,140,.8);
  --text:       #a8c0d4;
  --text-bright:#e8f4ff;
  --text-dim:   hsl(206, 20%, 54%);
  --red:    #ff4655;
  --cyan:   #00d4ff;
  --cyan-dim:rgba(0,212,255,.25);
  --yellow: #ffe84d;
  --green:  #4dffb4;
  --display: 'Barlow Condensed', sans-serif;
  --mono:    'Share Tech Mono', monospace;
  --title:   'Orbitron', sans-serif;
  --win:  #00d4aa;  --win-dim:  #003d30;
  --loss: #ff4655;  --loss-dim: #3d0d13;
  --draw: #6a8aa8;  --draw-dim: #1e2e3a;
  --glow-green: 0 0 8px rgba(77,255,180,.5);
  --glow-cyan:  0 0 8px rgba(0,212,255,.5);
}

.mh-util-scale-btn {
  padding: 2px 7px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 9px;
  cursor: pointer;
  letter-spacing: .06em;
  transition: all .1s;
}
.mh-util-scale-btn:hover { border-color: var(--border-bright); color: var(--text); }
.mh-util-scale-btn.active { border-color: var(--yellow); color: var(--yellow); background: rgba(255,232,77,.08); }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--mono); font-size: 12px;
  min-height: 100vh;
}

/* ── LAYOUT ─────────────────────────────────────────────── */
.mh-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  min-height: 100vh;
  align-items: start;
}

/* ── SIDEBAR ────────────────────────────────────────────────── */
.mh-sidebar {
  border-right: 1px solid var(--border);
  background: var(--panel);
  position: sticky; top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex; flex-direction: column;
}

/* ── PLAYER CARD ─────────────────────────────────────────── */
.player-card {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, #0d1520 0%, #101c2a 100%);
  position: relative;
  overflow: hidden;
}
.player-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--red), transparent);
}
.player-name-row {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 16px;
}
.player-name {
  font-family: var(--display); font-size: 16px; font-weight: 700;
  color: var(--text-bright); letter-spacing: .06em;
}
.player-tag { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 3px; }
.player-rank-badge {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; border: 1px solid var(--yellow);
  background: rgba(255,232,77,.07);
}
.player-rank-badge .rank-tier { font-family: var(--display); font-size: 11px; color: var(--yellow); font-weight: 700; letter-spacing: .06em; }
.player-rank-badge .rank-rr   { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }

.player-stats-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 1px; background: var(--border);
  border: 1px solid var(--border); margin-bottom: 14px;
}
.pstat { background: var(--bg2); padding: 10px 8px; text-align: center; }
.pstat-label { font-family: var(--mono); font-size: 9px; color: var(--text-dim); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
.pstat-val   { font-family: var(--display); font-size: 18px; font-weight: 700; color: var(--text-bright); line-height: 1; }
.pstat-val.good { color: var(--win); }
.pstat-val.warn { color: var(--yellow); }

.wr-bar-wrap { margin-bottom: 4px; }
.wr-bar-label {
  display: flex; justify-content: space-between;
  font-family: var(--mono); font-size: 10px; margin-bottom: 5px;
}
.wr-bar-label .wr-w  { color: var(--win); }
.wr-bar-label .wr-l  { color: var(--loss); }
.wr-bar-label .wr-pct{ color: var(--text); }
.wr-bar-track { height: 6px; background: var(--loss-dim); border: 1px solid var(--border); position: relative; }
.wr-bar-fill  { height: 100%; background: var(--win); position: absolute; left: 0; top: 0; }

/* ── FILTERS ──────────────────────────────────────────────── */
.mh-filters {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 10px;
}
.mh-filter-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: .12em;
  color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px;
}
.mh-btn-row { display: flex; gap: 3px; flex-wrap: wrap; }
.mhf-btn {
  padding: 5px 9px; border: 1px solid var(--border); background: var(--bg3);
  color: var(--text-dim); font-family: var(--mono); font-size: 10px;
  cursor: pointer; transition: all .12s; white-space: nowrap; letter-spacing: .04em;
}
.mhf-btn:hover  { border-color: var(--border-bright); color: var(--text); }
.mhf-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,.08); }
.mhf-btn.win-active  { border-color: var(--win);  color: var(--win);  background: rgba(0,212,170,.08); }
.mhf-btn.loss-active { border-color: var(--loss); color: var(--loss); background: rgba(255,70,85,.08); }

.mh-filter-select {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--text-bright); font-family: var(--mono); font-size: 11px;
  padding: 7px 10px; outline: none; appearance: none; cursor: pointer;
  transition: border-color .15s;
}
.mh-filter-select:focus { border-color: var(--cyan); }

/* ── MAIN AREA ────────────────────────────────────────────── */
.mh-main { padding: 20px; display: flex; flex-direction: column; gap: 0; }

.mh-toolbar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
  max-width: 1100px; margin-left: auto; margin-right: auto; width: 100%;
  margin-bottom: 14px;
}
.mh-count { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
.mh-count span { color: var(--cyan); }

/* ── MATCH CARDS ──────────────────────────────────────────── */
.match-list { display: flex; flex-direction: column; gap: 8px; max-width: 1800px; margin: 0 auto; width: 100%; }

.match-card {
  border: 1px solid var(--border);
  background: var(--bg2);
  cursor: pointer;
  transition: border-color .15s, background .15s;
  position: relative;
  overflow: hidden;
}
.match-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; z-index: 2;
  background: var(--result-color, var(--draw));
  box-shadow: 1px 0 12px color-mix(in srgb, var(--result-color, var(--draw)) 50%, transparent);
}
.match-card.win  { --result-color: var(--win); }
.match-card.loss { --result-color: var(--loss); }
.match-card:hover { border-color: var(--border-bright); background: rgba(255,255,255,.02); }
.match-card.open  { border-color: var(--cyan-dim); }
.match-card-inner { padding: 0; display: flex; align-items: stretch; gap: 0; min-height: 110px; }
.match-card-body  {
  padding: 0 20px 0 22px;
  display: flex; flex-direction: column; justify-content: center;
  gap: 0; flex: 1; min-width: 0;
}
/* Top row: result + score + RR prominent */
.match-card-top {
  display: flex; align-items: baseline; gap: 24px;
  padding: 16px 0 10px;
  border-bottom: 1px solid rgba(30,55,75,.5);
}
/* Bottom row: stats as secondary info */
.match-card-bottom {
  display: flex; align-items: center; gap: 24px;
  padding: 10px 0 14px;
}

/* Map image — full-height left panel */
.match-map-art {
  width: 120px; flex-shrink: 0;
  position: relative; overflow: hidden;
  display: flex; align-items: flex-end; justify-content: flex-start;
  background: var(--bg3);
  align-self: stretch;
  min-height: 80px;
}
.match-map-art img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover; display: block;
  filter: brightness(.5) saturate(.65);
  transition: filter .25s;
}
.match-card:hover .match-map-art img { filter: brightness(.7) saturate(.85); }
.match-map-art .map-label {
  position: relative; z-index: 2;
  padding: 0 0 10px 12px;
  font-family: var(--display); font-size: 10px; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase; color: rgba(255,255,255,.95);
  text-shadow: 0 1px 8px rgba(0,0,0,1);
  line-height: 1;
}
/* gradient vignette */
.match-map-art::after {
  content: '';
  position: absolute; inset: 0; z-index: 1;
  background:
    linear-gradient(to top, rgba(0,0,0,.8) 0%, rgba(0,0,0,.1) 45%, transparent 70%),
    linear-gradient(to right, rgba(0,0,0,.25) 0%, transparent 50%);
  pointer-events: none;
}
/* result tint */
.match-map-art .map-tint {
  position: absolute; inset: 0; z-index: 1;
  background: var(--result-color, transparent);
  opacity: .07;
  pointer-events: none;
  mix-blend-mode: color;
}

/* Agent — sits in top row alongside result */
.match-agent {
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.match-agent-icon {
  width: 44px; height: 44px; border-radius: 50%;
  border: 2px solid var(--result-color, var(--draw));
  background: var(--bg3); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display); font-size: 11px; color: var(--text-dim);
  overflow: hidden;
}
.match-agent-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.match-agent-name { font-family: var(--mono); font-size: 10px; color: var(--text-dim); white-space: nowrap; }

/* Result + score — headline in top row */
.match-result-col { display: flex; align-items: baseline; gap: 10px; flex-shrink: 0; }
.match-result {
  font-family: var(--display); font-size: 10px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--result-color, var(--draw));
  align-self: center;
}
.match-score {
  font-family: var(--display); font-size: 28px; font-weight: 900; color: var(--text-bright);
  line-height: 1; letter-spacing: -.02em;
}
.match-score .my-score { color: var(--result-color, var(--draw)); }
.match-score .sep { color: var(--text-dim); margin: 0 5px; font-weight: 300; opacity: .6; }
.match-map-name { font-family: var(--mono); font-size: 9px; color: var(--text-dim); letter-spacing: .04em; align-self: center; }

/* Stats row — bottom secondary row */
.match-stats { display: flex; gap: 28px; flex: 1; align-items: baseline; }
.mstat { display: flex; flex-direction: column; gap: 3px; }
.mstat-label { font-family: var(--mono); font-size: 8px; color: var(--text-dim); letter-spacing: .12em; text-transform: uppercase; }
.mstat-val   { font-family: var(--display); font-size: 16px; font-weight: 700; color: var(--text-bright); line-height: 1; }
.mstat-val.kda  { font-size: 13px; letter-spacing: .01em; }
.mstat-val.good { color: var(--win); }
.mstat-val.ok   { color: var(--yellow); }
.mstat-val.bad  { color: var(--loss); }

/* FB/FD badges on match card — removed from front, lives in expanded table only */
.match-fb-fd { display: none; }

/* RR delta — top row, right side, the other headline number */
.match-rr {
  display: flex; flex-direction: column; align-items: flex-end;
  margin-left: auto; padding-right: 4px;
}
.rr-delta {
  font-family: var(--display); font-size: 30px; font-weight: 900; line-height: 1; letter-spacing: -.02em;
}
.rr-delta.pos { color: var(--win); text-shadow: 0 0 24px rgba(0,212,170,.4); }
.rr-delta.neg { color: var(--loss); text-shadow: 0 0 24px rgba(255,70,85,.35); }
.rr-after { font-family: var(--mono); font-size: 9px; color: var(--text-dim); margin-top: 5px; }

/* Timestamp + meta — bottom row right */
.match-meta-col { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; margin-left: auto; flex-shrink: 0; }
.match-time { font-family: var(--mono); font-size: 9px; color: var(--text-dim); text-align: right; }
.match-meta-tags { display: flex; gap: 4px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
.meta-tag {
  font-family: var(--mono); font-size: 8px; letter-spacing: .06em;
  padding: 1px 6px; color: var(--text-dim); border: 1px solid rgba(30,60,90,.6);
  white-space: nowrap;
}
.match-links {
  display: flex; gap: 5px; align-items: center; justify-content: flex-end;
}
.match-link {
  font-family: var(--mono); font-size: 9px; color: var(--text);
  text-decoration: none; letter-spacing: .05em;
  padding: 3px 8px; border: 1px solid var(--border);
  background: var(--bg3);
  transition: border-color .15s, color .15s, background .15s;
  white-space: nowrap; display: inline-block;
}
.match-link:hover { color: var(--cyan); border-color: var(--cyan); background: rgba(0,212,255,.06); }
.expand-chevron {
  font-size: 9px; color: var(--text-dim); transition: transform .2s;
  user-select: none; opacity: .5;
}
.match-card.open .expand-chevron { transform: rotate(180deg); color: var(--cyan); opacity: 1; }

/* ── SCOREBOARD EXPAND ────────────────────────────────────── */
.match-scoreboard {
  display: none;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.match-scoreboard * { pointer-events: auto; }
.match-card.open .match-scoreboard { display: block; }

.sb-header {
  padding: 10px 18px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}
.sb-header-stat {
  font-family: var(--mono); font-size: 10px;
  display: flex; gap: 20px; color: var(--text-dim); flex-wrap: wrap;
}
.sb-header-stat span { color: var(--text-bright); }
.sb-header-meta {
  font-family: var(--mono); font-size: 9px;
  display: flex; gap: 12px; color: var(--text-dim); flex-wrap: wrap; align-items: center;
}
.sb-header-meta .meta-chip {
  padding: 2px 7px; border: 1px solid rgba(30,60,90,.7);
  color: var(--text-dim); white-space: nowrap;
}
.sb-header-meta .meta-chip.queue { border-color: rgba(0,212,255,.3); color: var(--cyan); }
.sb-header-meta .meta-chip.patch { border-color: rgba(255,232,77,.25); color: var(--yellow); }
.sb-header-meta .meta-chip.cluster { border-color: rgba(100,160,200,.3); color: #7ab4d4; }

.sb-team-block { }
.sb-team-label {
  padding: 6px 18px 6px 22px;
  font-family: var(--mono); font-size: 9px; letter-spacing: .15em; text-transform: uppercase;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
}
.sb-team-label.blue-team { background: rgba(0,120,255,.06); color: #4da6ff; border-left: 3px solid #4da6ff; }
.sb-team-label.red-team  { background: rgba(255,70,85,.06);  color: var(--red); border-left: 3px solid var(--red); }

/* ── SORTABLE TABLE ──────────────────────────────────────── */
.sb-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.sb-table th {
  padding: 7px 12px; font-family: var(--mono); font-size: 10px; font-weight: 500;
  letter-spacing: .1em; color: var(--text-dim); text-transform: uppercase;
  text-align: right; border-bottom: 1px solid rgba(30,48,64,.7);
  background: var(--bg2);
  cursor: pointer; user-select: none;
  white-space: nowrap;
  transition: color .15s;
}
.sb-table th:first-child { text-align: left; padding-left: 22px; cursor: default; }
.sb-table th:not(:first-child):hover { color: var(--text-bright); }
.sb-table th.sort-asc::after  { content: ' ▲'; color: var(--cyan); font-size: 8px; }
.sb-table th.sort-desc::after { content: ' ▼'; color: var(--cyan); font-size: 8px; }
.sb-table th.sorted { color: var(--cyan); }

.sb-table td {
  padding: 9px 12px; border-bottom: 1px solid rgba(30,48,64,.4);
  font-family: var(--mono); font-size: 13px; color: var(--text);
  text-align: right; vertical-align: middle;
}
.sb-table td:first-child { text-align: left; padding-left: 22px; }
.sb-table tr:last-child td { border-bottom: none; }
.sb-table tr:hover td { background: rgba(255,255,255,.03); }
.sb-table tr.is-you td { background: rgba(0,212,255,.05); }
.sb-table tr.is-you td:first-child { border-left: 2px solid var(--cyan); padding-left: 20px; }

.sb-player-cell { display: flex; align-items: center; gap: 10px; }
.sb-table th:first-child,
.sb-table td:first-child { width: 260px; min-width: 260px; max-width: 260px; }
.sb-agent-icon {
  width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--bg3); object-fit: cover;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--text-dim); flex-shrink: 0; overflow: hidden;
}
.sb-agent-icon img { width: 100%; height: 100%; object-fit: cover; }
.sb-agent-name { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
.sb-player-name { color: var(--text-bright); font-size: 13px; font-weight: 500; letter-spacing: .01em; }
.sb-player-name.you { color: var(--cyan); }
.sb-rank-badge {
  font-size: 9px; padding: 2px 6px; border: 1px solid;
  letter-spacing: .05em; flex-shrink: 0;
}
.sb-rank-badge.gold    { border-color: #ffd700; color: #ffd700; }
.sb-rank-badge.silver  { border-color: #c0c4c8; color: #c0c4c8; }
.sb-rank-badge.bronze  { border-color: #cd7f32; color: #cd7f32; }
.sb-rank-badge.plat    { border-color: #3ad6d6; color: #3ad6d6; }
.sb-rank-badge.diamond { border-color: #b09dff; color: #b09dff; }
.sb-rank-badge.iron    { border-color: #7a8a9a; color: #7a8a9a; }
.sb-rank-badge.ascendant { border-color: #4dffb4; color: #4dffb4; }
.sb-rank-badge.immortal  { border-color: #ff6b8a; color: #ff6b8a; }
.sb-rank-badge.radiant   { border-color: #ffe84d; color: #ffe84d; }

.sb-kda { color: var(--text-bright); font-size: 13px; }
.sb-util-kda { color: var(--text-bright); font-size: 13px; }
.sb-util-total {
  display: inline-block; margin-left: 5px;
  font-family: var(--mono); font-size: 9px; color: var(--text-dim);
  background: rgba(255,255,255,.06); border: 1px solid var(--border);
  padding: 1px 4px; vertical-align: middle; letter-spacing: .03em;
}
.sb-acs-val { color: var(--cyan); font-weight: 700; font-size: 13px; }
.hs-ok   { color: var(--text); }
.hs-good { color: var(--win); }
.hs-hot  { color: var(--yellow); }

/* ── PARTY INDICATOR ─────────────────────────────────────── */
.party-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,.15);
  display: inline-block;
}
.party-solo { opacity: 0; } /* no dot for solo players */

/* ── UTILITY USAGE — table column ────────────────────────── */
.util-cell { text-align: right !important; }
.util-row {
  display: flex; gap: 3px; align-items: center; justify-content: flex-end;
}
.util-chip {
  font-family: var(--mono); font-size: 10px; letter-spacing: .02em;
  padding: 2px 5px; border: 1px solid rgba(0,180,220,.2);
  color: var(--text); background: rgba(0,140,180,.08);
  white-space: nowrap; display: flex; align-items: center; gap: 2px;
}
.util-chip .util-key { color: var(--cyan); font-size: 9px; opacity: .8; }
.util-chip .util-val { color: var(--text-bright); font-weight: 600; }
.util-chip .util-key { color: rgba(0,180,220,.7); }
.util-chip .util-val { color: var(--text); }

/* ── FB / FD in scoreboard ───────────────────────────────── */
.cell-fb { color: var(--win); font-weight: 700; }
.cell-fd { color: var(--loss); }
.cell-fb.zero, .cell-fd.zero { color: var(--text-dim); }

/* ── PLAYER EXPAND PANEL ─────────────────────────────────── */
.sb-table tr.sb-player-row { cursor: pointer; }
.sb-table tr.sb-player-row td { transition: background .12s; }
.sb-table tr.sb-player-row:hover td { background: rgba(0,212,255,.04); }
.sb-table tr.sb-player-row.pex-open td { background: rgba(0,212,255,.06); }
.sb-table tr.sb-player-row .sb-player-name { transition: color .12s; }
.sb-table tr.sb-player-row.pex-open .sb-player-name { color: var(--cyan); }

.sb-pex-row { display: none; }
.sb-pex-row.open { display: table-row; }
.sb-pex-row td {
  padding: 0 !important;
  background: var(--bg) !important;
  border-bottom: 2px solid var(--border) !important;
  max-width: 0;
  overflow: hidden;
}

/* ── EXPAND CONTENT SHELL ───────────────────────────────── */
.sb-pex-content {
  padding: 0;
  display: flex;
  flex-direction: row;
  min-width: 0;
  max-width: 100%;
  overflow: hidden;
  box-sizing: border-box;
}

/* ── PANELS ─────────────────────────────────────────────── */
.sb-pex-panel {
  min-width: 0;
  overflow: hidden;
  flex: 2 1 0;
  padding: 20px 24px 24px;
  position: relative;
  border-right: 1px solid var(--border);
  border-top: 1px solid var(--border);
}
.sb-pex-panel:last-child { border-right: none; }

.sb-pex-panel.util-panel {
  flex: 5 1 0;
  background: linear-gradient(160deg, rgba(0,212,255,.018) 0%, transparent 55%);
}

/* ── PANEL HEADER ───────────────────────────────────────── */
.sb-pex-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .18em;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  opacity: .8;
}
.sb-pex-title::before { content: '//'; color: rgba(0,212,255,.3); font-size: 11px; }

/* ── STAT GRID ──────────────────────────────────────────── */
.sb-pex-stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  border: 1px solid var(--border);
}
.sb-pex-stat {
  padding: 13px 14px 11px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.sb-pex-stat:nth-child(2n)        { border-right: none; }
.sb-pex-stat:nth-last-child(-n+2) { border-bottom: none; }
.sb-pex-stat:last-child:nth-child(odd) {
  grid-column: 1 / -1;
  border-right: none;
}

.sb-pex-stat-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity: .65;
}
.sb-pex-stat-val {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
  line-height: 1;
  letter-spacing: -.01em;
}
/* KDA string is longer, tighten slightly */
.sb-pex-stat-val.kda-str { font-size: 15px; letter-spacing: .02em; }
.sb-pex-stat-val.good { color: var(--win); }
.sb-pex-stat-val.warn { color: var(--yellow); }
.sb-pex-stat-val.bad  { color: var(--loss); }

/* ── UTIL MODE TOGGLE ───────────────────────────────────── */
.mh-util-scale-btn {
  padding: 4px 10px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  letter-spacing: .08em;
  transition: all .1s;
}
.mh-util-scale-btn:hover { border-color: var(--border-bright); color: var(--text); }
.mh-util-scale-btn.active {
  border-color: var(--yellow);
  color: var(--yellow);
  background: rgba(255,232,77,.08);
}

/* ── UTIL BARS ──────────────────────────────────────────── */
.sb-pex-util-row {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: background .12s;
  padding: 8px 10px;
  margin: 0 -10px;
  min-width: 0;
  width: calc(100% + 20px);
}
.sb-pex-util-row:hover { background: rgba(255,255,255,.04); }
.sb-pex-util-row.open  { background: rgba(255,255,255,.05); }

.sb-pex-util-desc {
  display: none;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  line-height: 1.7;
  letter-spacing: .02em;
  padding: 6px 10px 12px 42px;
  border-left: 1px solid rgba(0,212,255,.2);
  margin: 0 0 4px 10px;
}
.sb-pex-util-row.open + .sb-pex-util-desc { display: block; }

.sb-pex-util-icon {
  width: 16px; height: 16px;
  object-fit: contain; flex-shrink: 0; opacity: .85;
}
.sb-pex-util-icon-fallback {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  width: 16px; text-align: center; flex-shrink: 0;
}

/* ability name — no fixed width, no truncation */
.sb-pex-util-name {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  letter-spacing: .06em;
  text-transform: uppercase;
  flex-shrink: 0;
  white-space: nowrap;
  min-width: 80px;
}

.sb-pex-util-track {
  flex: 1;
  min-width: 60px;
  height: 7px;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.sb-pex-util-fill {
  height: 100%;
  position: absolute;
  top: 0; left: 0;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}

.sb-pex-util-val {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  min-width: 36px;
  white-space: nowrap;
  text-align: right;
  flex-shrink: 0;
}
.sb-pex-util-cpr {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  min-width: 46px;
  white-space: nowrap;
  text-align: right;
  opacity: .4;
  flex-shrink: 0;
}

/* ── LINKS PANEL ────────────────────────────────────────── */
.sb-pex-links { display: flex; flex-direction: column; gap: 8px; }
.sb-pex-link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.02);
  text-decoration: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: .04em;
  transition: border-color .15s, background .15s, color .15s;
}
.sb-pex-link:hover {
  color: var(--cyan);
  border-color: rgba(0,212,255,.4);
  background: rgba(0,212,255,.05);
}
.sb-pex-link-icon { font-size: 14px; opacity: .45; flex-shrink: 0; }
.sb-pex-link-label { flex: 1; min-width: 0; }
.sb-pex-link-sub {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  letter-spacing: .05em;
  opacity: .55;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── PAGINATION ───────────────────────────────────────────── */
.mh-pagination {
  display: flex; justify-content: center; gap: 6px;
  padding: 24px 0 8px;
}
.page-btn {
  padding: 6px 14px; border: 1px solid var(--border); background: var(--bg3);
  color: var(--text-dim); font-family: var(--mono); font-size: 11px;
  cursor: pointer; transition: all .12s;
}
.page-btn:hover { border-color: var(--border-bright); color: var(--text); }
.page-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,212,255,.08); }

/* ── EMPTY STATE ──────────────────────────────────────────── */
.mh-empty {
  padding: 60px 20px; text-align: center;
  font-family: var(--mono); font-size: 13px; color: var(--text-dim);
  border: 1px dashed var(--border); margin-top: 10px;
}
.mh-empty .em-icon { font-size: 32px; margin-bottom: 14px; opacity: .4; }
</style>
</head>
<body>
<div class="mh-layout">

<script>
'use strict';

/* ══════════════════════════════════════════════════════════════════
   CHARGE-SCALE / UUS HELPERS
   Shared between scoreboard player panels.
══════════════════════════════════════════════════════════════════ */
const AGENT_ABILITY_META_MH = {
  "Astra":    { charges: {c:1,q:1,e:2,x:1}, ult_orbs:7  },
  "Breach":   { charges: {c:1,q:2,e:1,x:1}, ult_orbs:8  },
  "Brimstone":{ charges: {c:1,q:1,e:3,x:1}, ult_orbs:8  },
  "Chamber":  { charges: {c:1,q:1,e:1,x:1}, ult_orbs:8  },
  "Clove":    { charges: {c:1,q:1,e:2,x:1}, ult_orbs:8  },
  "Cypher":   { charges: {c:2,q:2,e:1,x:1}, ult_orbs:7  },
  "Deadlock": { charges: {c:1,q:2,e:1,x:1}, ult_orbs:7  },
  "Fade":     { charges: {c:2,q:1,e:1,x:1}, ult_orbs:8  },
  "Gekko":    { charges: {c:1,q:1,e:1,x:1}, ult_orbs:8  },
  "Harbor":   { charges: {c:1,q:1,e:1,x:1}, ult_orbs:7  },
  "Iso":      { charges: {c:1,q:1,e:1,x:1}, ult_orbs:7  },
  "Jett":     { charges: {c:2,q:1,e:1,x:1}, ult_orbs:8  },
  "KAYO":     { charges: {c:1,q:2,e:1,x:1}, ult_orbs:8  },
  "Killjoy":  { charges: {c:2,q:1,e:1,x:1}, ult_orbs:9  },
  "Miks":     { charges: {c:2,q:1,e:2,x:1}, ult_orbs:8  },
  "Neon":     { charges: {c:1,q:1,e:1,x:1}, ult_orbs:8  },
  "Omen":     { charges: {c:2,q:1,e:2,x:1}, ult_orbs:7  },
  "Phoenix":  { charges: {c:1,q:1,e:2,x:1}, ult_orbs:6  },
  "Raze":     { charges: {c:1,q:2,e:1,x:1}, ult_orbs:8  },
  "Reyna":    { charges: {c:2,q:2,e:2,x:1}, ult_orbs:7  },
  "Sage":     { charges: {c:1,q:2,e:1,x:1}, ult_orbs:7  },
  "Skye":     { charges: {c:1,q:1,e:2,x:1}, ult_orbs:8  },
  "Sova":     { charges: {c:1,q:2,e:1,x:1}, ult_orbs:8  },
  "Tejo":     { charges: {c:1,q:1,e:2,x:1}, ult_orbs:9  },
  "Veto":     { charges: {c:2,q:1,e:1,x:1}, ult_orbs:7  },
  "Viper":    { charges: {c:1,q:1,e:1,x:1}, ult_orbs:9  },
  "Vyse":     { charges: {c:2,q:1,e:1,x:1}, ult_orbs:8  },
  "Waylay":   { charges: {c:1,q:1,e:1,x:1}, ult_orbs:8  },
  "Yoru":     { charges: {c:1,q:1,e:2,x:1}, ult_orbs:8  },
};

function getMHMaxCPR(agentName) {
  const meta = AGENT_ABILITY_META_MH[agentName];
  if (!meta) return { c:1, q:1, e:1, x:1/7 };
  return { c: meta.charges.c||1, q: meta.charges.q||1, e: meta.charges.e||1, x: 1/(meta.ult_orbs||7) };
}

// UUS: (avg non-ult fraction of capacity + ult fraction) / 2 × 100
function computeUUSMH(agentName, cprC, cprQ, cprE, cprX) {
  const m = getMHMaxCPR(agentName);
  const utilFrac = ((Math.min(cprC,m.c)/m.c) + (Math.min(cprQ,m.q)/m.q) + (Math.min(cprE,m.e)/m.e)) / 3;
  const ultFrac  = Math.min(cprX, m.x) / m.x;
  return ((utilFrac + ultFrac) / 2) * 100;
}

// Global util display mode: 'raw' = CPR-based bars, 'charge' = charge-scaled + UUS
let mhUtilMode = 'raw';

/* ═══════════════════════════════════════════════════════════════
   PARTY COLORS — assign unique colors per party_id scoped to each match
═══════════════════════════════════════════════════════════════ */
const PARTY_PALETTE = [
  '#f4c542','#42b4f4','#f47c42','#a142f4',
  '#42f4a1','#f44278','#78f442','#4278f4',
];

/* Returns a { partyId -> color } map for one match.
   Only IDs appearing more than once (real parties) get a color.
   Colors are assigned in palette order, guaranteed unique within the match. */
function buildPartyColorMap(allPlayers) {
  const counts = {};
  for (const p of allPlayers) if (p.party_id) counts[p.party_id] = (counts[p.party_id]||0)+1;
  const map = {};
  let idx = 0;
  for (const id of Object.keys(counts)) {
    if (counts[id] > 1) map[id] = PARTY_PALETTE[idx++ % PARTY_PALETTE.length];
  }
  return map;
}

/* ═══════════════════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════════════════ */
const MAP_COLORS = {
  'Lotus':'#c8a96e','Pearl':'#7eb8c8','Ascent':'#e8c478',
  'Bind':'#d4916a','Haven':'#88b47a','Split':'#a89070',
  'Icebox':'#78b4d4','Fracture':'#a87ab4','Breeze':'#6ab4a8',
  'Sunset':'#e89060','Abyss':'#5a78b4','Corrode':'#6a9a7a',
};

function fmt(sec) {
  if (!sec) return '??:??';
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}
function fmtTime(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d.getDate()} ${mo[d.getMonth()]} · ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

/* Identify which party_ids appear more than once per match team — solo = unique */
function buildPartyGroups(bluePlayers, redPlayers) {
  const tally = id => {
    const counts = {};
    for (const p of id) counts[p.party_id] = (counts[p.party_id]||0)+1;
    return counts;
  };
  // Build color map scoped to this match (all 10 players together)
  const colorMap = buildPartyColorMap([...bluePlayers, ...redPlayers]);
  return { blue: tally(bluePlayers), red: tally(redPlayers), colorMap };
}

function mapRow(r, partyCounts, colorMap) {
  const isPartyMember = partyCounts && r.party_id && (partyCounts[r.party_id]||0) > 1;
  return {
    name:         `${r.name}#${r.tag}`,
    you:          r.is_me,
    agent:        r.agent || '?',
    agentInitial: (r.agent||'??').slice(0,2).toUpperCase(),
    agentIcon:    r.agent_icon || '',
    rank:         r.rank_short || 'iron',
    rankFull:     r.rank || '',
    kda:          `${r.kills}/${r.deaths}/${r.assists}`,
    kills:        r.kills, deaths: r.deaths, assists: r.assists,
    acs:          r.acs != null ? Math.round(r.acs) : 0,
    adr:          r.adr != null ? Math.round(r.adr) : null,
    hs:           r.hs_pct,
    puuid:        r.puuid,
    abilityCasts: r.ability_casts || null,
    firstBloods:  r.first_bloods ?? null,
    firstDeaths:  r.first_deaths ?? null,
    partyId:      r.party_id || null,
    partyColor:   isPartyMember ? (colorMap?.[r.party_id] || null) : null,
    inParty:      isPartyMember,
  };
}

function normalise(m) {
  const sb = m.scoreboard || {};
  const bluePlayers = sb.blue || [];
  const redPlayers  = sb.red  || [];
  const partyCounts = buildPartyGroups(bluePlayers, redPlayers);

  // Find player's own row for fb/fd on match card
  const myRow = [...bluePlayers,...redPlayers].find(p => p.is_me);

  const assets = (window.MATCH_HISTORY_DATA?.assets) || {};
  const mapAssets = (assets.maps || {})[m.map] || {};

  return {
    id:           m.id,
    result:       m.result,
    map:          m.map,
    mapColor:     MAP_COLORS[m.map] || '#6a8aa8',
    mapIcon:      mapAssets.listViewIcon || '',
    mapSplash:    mapAssets.splash || '',
    queue:        m.queue || 'Competitive',
    cluster:      m.cluster || '',
    patch:        m.patch || '',
    season:       m.season || '',
    agent:        m.agent || 'Unknown',
    agentIcon:    m.agent_icon || '',
    agentInitial: (m.agent||'??').slice(0,2).toUpperCase(),
    scoreUs:      m.score_us,
    scoreThem:    m.score_them,
    kda:          `${m.kills}/${m.deaths}/${m.assists}`,
    kills:        m.kills, deaths: m.deaths, assists: m.assists,
    acs:          m.acs != null ? Math.round(m.acs) : null,
    adr:          m.adr != null ? Math.round(m.adr) : null,
    hs:           m.hs_pct,
    rrDelta:      m.rr_delta,
    rrAfter:      m.rank ? `${m.rank} · ${m.rr ?? '?'} RR` : null,
    duration:     fmt(m.duration_sec),
    rounds:       m.rounds,
    time:         fmtTime(m.game_start_ms),
    firstBloods:  myRow?.first_bloods ?? null,
    firstDeaths:  myRow?.first_deaths ?? null,
    scoreboard: {
      blue: bluePlayers.map(r => mapRow(r, partyCounts.blue, partyCounts.colorMap)),
      red:  redPlayers.map(r  => mapRow(r, partyCounts.red,  partyCounts.colorMap)),
    },
  };
}

/* ── Resolve source ─────────────────────────────────────────── */
let SOURCE_META = null;
let MATCHES = [];

if (window.MATCH_HISTORY_DATA) {
  SOURCE_META = window.MATCH_HISTORY_DATA.meta || null;
  MATCHES = (window.MATCH_HISTORY_DATA.matches || []).map(normalise);
} else {
  MATCHES = [

/* ── Populate sidebar ─────────────────────────────────────────── */
function initSidebar() {
  if (!SOURCE_META) return;
  const m = SOURCE_META;
  const total = m.wins + m.losses;
  document.querySelector('.player-name').textContent = m.name;
  document.querySelector('.player-tag').textContent  = `#${m.tag}`;

  const latest = MATCHES[0];
  if (latest && latest.rrAfter) {
    document.querySelector('.rank-tier').textContent = latest.rrAfter.split(' · ')[0] || '—';
    document.querySelector('.rank-rr').textContent   = latest.rrAfter.split(' · ')[1] || '—';
  }

  let totalK=0,totalD=0,totalA=0,totalAcs=0,totalAdr=0,acsCount=0,adrCount=0;
  MATCHES.forEach(mx => {
    totalK+=mx.kills; totalD+=mx.deaths; totalA+=mx.assists;
    if(mx.acs!=null){totalAcs+=mx.acs;acsCount++;}
    if(mx.adr!=null){totalAdr+=mx.adr;adrCount++;}
  });
  const kd  = totalD>0?(totalK/totalD).toFixed(2):totalK.toFixed(2);
  const acs = acsCount?Math.round(totalAcs/acsCount):'—';
  const adr = adrCount?Math.round(totalAdr/adrCount):'—';

  const pstats = document.querySelectorAll('.pstat');
  if(pstats.length>=6){
    pstats[0].querySelector('.pstat-val').textContent = kd;
    pstats[1].querySelector('.pstat-val').textContent = acs;
    pstats[3].querySelector('.pstat-val').textContent = adr;
    pstats[4].querySelector('.pstat-val').textContent = m.wins;
    pstats[5].querySelector('.pstat-val').textContent = m.match_count;
  }
  const wr = m.winrate||0;
  document.querySelector('.wr-bar-label .wr-w').textContent  = `${m.wins}W`;
  document.querySelector('.wr-bar-label .wr-pct').textContent= `${wr.toFixed(1)}% WR`;
  document.querySelector('.wr-bar-label .wr-l').textContent  = `${m.losses}L`;
  document.querySelector('.wr-bar-fill').style.width = wr+'%';
}

/* ── SORT STATE ──────────────────────────────────────────────── */
// per-match sort state: { matchId: { team, col, dir } }
const sortState = {};

function sortTeam(matchId, team, col, event) {
  if (event) event.stopPropagation();
  const key = `${matchId}_${team}`;
  const cur = sortState[key] || { col: null, dir: 'desc' };
  const dir = (cur.col === col && cur.dir === 'desc') ? 'asc' : 'desc';

  const m = MATCHES.find(x => x.id === matchId);
  if (!m) return;

  const colVal = p => {
    switch(col) {
      case 'kda':  return p.deaths > 0 ? p.kills / p.deaths : p.kills;
      case 'acs':  return p.acs ?? -1;
      case 'adr':  return p.adr ?? -1;
      case 'hs':   return p.hs  ?? -1;
      case 'fb':   return p.firstBloods ?? -1;
      case 'fd':   return p.firstDeaths ?? -1;
      case 'util': return p.abilityCasts ? (p.abilityCasts.c+p.abilityCasts.q+p.abilityCasts.e+p.abilityCasts.x) : -1;
      default:     return 0;
    }
  };

  // Apply sort to both teams
  for (const t of ['blue', 'red']) {
    const tKey = `${matchId}_${t}`;
    sortState[tKey] = { col, dir };

    const players = [...m.scoreboard[t]];
    players.sort((a, b) => dir === 'desc' ? colVal(b) - colVal(a) : colVal(a) - colVal(b));

    const tbody = document.querySelector(`[data-match-id="${matchId}"] .sb-tbody-${t}`);
    if (tbody) tbody.innerHTML = players.map(p => sbRow(p, m.rounds)).join('');

    const table = document.querySelector(`[data-match-id="${matchId}"] .sb-table-${t}`);
    if (table) {
      table.querySelectorAll('th[data-col]').forEach(th => {
        th.classList.remove('sort-asc','sort-desc','sorted');
        if (th.dataset.col === col) {
          th.classList.add('sorted', dir === 'asc' ? 'sort-asc' : 'sort-desc');
        }
      });
    }
  }
}

/* ── EXPAND STATE ────────────────────────────────────────────── */
let openMatch = null;
function toggleMatch(id) {
  const card = document.querySelector(`[data-match-id="${id}"]`);
  if (!card) return;
  if (openMatch && openMatch !== id) {
    const prev = document.querySelector(`[data-match-id="${openMatch}"]`);
    if (prev) prev.classList.remove('open');
  }
  openMatch = (openMatch === id) ? null : id;
  card.classList.toggle('open', openMatch === id);
}

/* ── RENDER HELPERS ──────────────────────────────────────────── */
function kdaColor(kda) {
  const [k,d] = kda.split('/').map(Number);
  const r = d > 0 ? k/d : k;
  return r >= 1.3 ? 'good' : r >= 0.9 ? '' : 'bad';
}
function acsColor(v) { return v >= 280 ? 'good' : v >= 200 ? '' : 'bad'; }
function hsClass(v)  { return !v ? '' : v >= 25 ? 'hs-hot' : v >= 18 ? 'hs-good' : 'hs-ok'; }

function rankBadge(rank, rankFull) {
  const label = rankFull ? rankFull.replace(/\s\d+$/, '') : (rank.charAt(0).toUpperCase()+rank.slice(1));
  return `<span class="sb-rank-badge ${rank}">${label}</span>`;
}

function agentCell(p) {
  if (p.agentIcon) {
    return `<img class="sb-agent-icon" src="${p.agentIcon}" alt="${p.agent}" onerror="this.outerHTML='<div class=sb-agent-icon>${p.agentInitial}</div>'">`;
  }
  return `<div class="sb-agent-icon">${p.agentInitial}</div>`;
}

function utilChips(casts) {
  if (!casts) return '';
  const keys = ['c','q','e','x'];
  const vals = keys.map(k => casts[k] ?? 0);
  if (vals.every(v => v === 0)) return '';
  const total = vals.reduce((a, b) => a + b, 0);
  return `<span class="sb-util-kda">${vals.join('/')}</span><span class="sb-util-total">${total}</span>`;
}

function buildPlayerPanel(p, rounds) {
  const SLOT_COL = { c: '#00d4ff', q: '#ffe84d', e: '#39ff14', x: '#ff4655' };

  // Resolve ability names for this player's agent from the assets table
  const agentAssets = ((window.MATCH_HISTORY_DATA?.assets?.agents) || {})[p.agent];
  const abilityNames = agentAssets?.abilities?.ability_names || {};

  // ── Stats panel ──────────────────────────────────────────────
  const kdaRatio = p.deaths > 0 ? (p.kills / p.deaths) : p.kills;
  const kdaCls = kdaRatio >= 1.3 ? 'good' : kdaRatio >= 0.9 ? '' : 'bad';
  const acsCls = p.acs >= 280 ? 'good' : p.acs >= 200 ? '' : 'bad';
  const hsCls  = !p.hs ? '' : p.hs >= 25 ? 'warn' : p.hs >= 18 ? 'good' : '';
  const hsStr  = p.hs != null ? p.hs.toFixed(1)+'%' : '—';
  const adrStr = p.adr != null ? p.adr : '—';
  const fbStr  = p.firstBloods != null ? p.firstBloods : '—';
  const fdStr  = p.firstDeaths != null ? p.firstDeaths : '—';
  const fbCls  = p.firstBloods > 0 ? 'good' : '';
  const fdCls  = p.firstDeaths > 0 ? 'bad' : '';

  const statsPanel = `
    <div class="sb-pex-panel">
      <div class="sb-pex-title">Performance</div>
      <div class="sb-pex-stat-grid">
        <div class="sb-pex-stat">
          <div class="sb-pex-stat-label">KDA</div>
          <div class="sb-pex-stat-val kda-str">${p.kda}</div>
        </div>
        <div class="sb-pex-stat">
          <div class="sb-pex-stat-label">K/D Ratio</div>
          <div class="sb-pex-stat-val ${kdaCls}">${kdaRatio.toFixed(2)}</div>
        </div>
        <div class="sb-pex-stat">
          <div class="sb-pex-stat-label">ACS</div>
          <div class="sb-pex-stat-val ${acsCls}">${p.acs ?? '—'}</div>
        </div>
        <div class="sb-pex-stat">
          <div class="sb-pex-stat-label">ADR</div>
          <div class="sb-pex-stat-val">${adrStr}</div>
        </div>
        <div class="sb-pex-stat">
          <div class="sb-pex-stat-label">Headshot %</div>
          <div class="sb-pex-stat-val ${hsCls}">${hsStr}</div>
        </div>
        <div class="sb-pex-stat">
          <div class="sb-pex-stat-label">First Bloods</div>
          <div class="sb-pex-stat-val ${fbCls}">${fbStr}</div>
        </div>
        <div class="sb-pex-stat">
          <div class="sb-pex-stat-label">First Deaths</div>
          <div class="sb-pex-stat-val ${fdCls}">${fdStr}</div>
        </div>
      </div>
    </div>`;

  // ── Utility panel ─────────────────────────────────────────────
  let utilInner = '';
  const casts = p.abilityCasts;
  if (casts) {
    const abilityIcons = agentAssets?.abilities?.ability_icons || {};
    const abilityDescs = agentAssets?.abilities?.ability_descriptions || {};
    const isChargeMode = mhUtilMode === 'charge';
    const agentMeta = isChargeMode ? (AGENT_ABILITY_META_MH[p.agent] || null) : null;
    const maxCPR    = isChargeMode ? getMHMaxCPR(p.agent) : null;

    // UUS badge at top when in charge mode
    if (isChargeMode && rounds && rounds > 0) {
      const cprC = (casts.c ?? 0) / rounds, cprQ = (casts.q ?? 0) / rounds;
      const cprE = (casts.e ?? 0) / rounds, cprX = (casts.x ?? 0) / rounds;
      const uus = computeUUSMH(p.agent, cprC, cprQ, cprE, cprX);
      const uusCol = uus >= 70 ? '#00d4aa' : uus >= 45 ? '#ffe84d' : '#ff4655';
      utilInner += `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);">
          <span style="font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;" title="Utility Usage Score: fraction of charge capacity used, vs theoretical max. Ult scored at 1-orb/round cadence. 100% = perfect usage.">Util Usage Score</span>
          <span style="font-family:var(--mono);font-size:16px;font-weight:700;color:${uusCol};">${uus.toFixed(1)}%</span>
        </div>
        <div style="height:2px;background:var(--border);margin-bottom:10px;position:relative;overflow:hidden;">
          <div style="position:absolute;left:0;top:0;height:100%;width:${Math.min(100,uus)}%;background:${uusCol};"></div>
        </div>`;
    }

    ['c','q','e','x'].forEach(k => {
      const v    = casts[k] ?? 0;
      const cprVal = (rounds && rounds > 0) ? v / rounds : 0;
      const col  = SLOT_COL[k];
      const name = abilityNames[k] || k.toUpperCase();
      const desc = abilityDescs[k] || '';
      const rowId = 'util-' + Math.random().toString(36).slice(2, 9);

      const iconSrc = abilityIcons[k];
      const iconHtml = iconSrc
        ? `<img class="sb-pex-util-icon" src="${iconSrc}" alt="${name}" style="filter:drop-shadow(0 0 3px ${col}66);" onerror="this.outerHTML='<span class=sb-pex-util-icon-fallback style=color:${col}>${k.toUpperCase()}</span>'">`
        : `<span class="sb-pex-util-icon-fallback" style="color:${col}">${k.toUpperCase()}</span>`;

      let pct, rightHtml, chargeNote = '';
      if (isChargeMode && maxCPR && rounds && rounds > 0) {
        const cap = maxCPR[k];
        const capPct = Math.min(100, (cprVal / cap) * 100);
        pct = capPct;
        // charge annotation
        if (k === 'x') {
          const orbCost = agentMeta ? agentMeta.ult_orbs : 7;
          chargeNote = `<span style="font-family:var(--mono);font-size:8px;color:var(--text-dim);margin-left:3px;">(${orbCost} orbs)</span>`;
        } else if (agentMeta && (agentMeta.charges[k]||1) > 1) {
          chargeNote = `<span style="font-family:var(--mono);font-size:8px;color:var(--text-dim);margin-left:3px;">(${agentMeta.charges[k]} chg)</span>`;
        }
        rightHtml = `<span class="sb-pex-util-val" style="color:${col};font-weight:600;">${capPct.toFixed(0)}%</span>`
          + `<span class="sb-pex-util-cpr" style="color:var(--text-dim);">${cprVal.toFixed(2)}/r</span>`;
      } else {
        pct  = Math.min(100, cprVal * 100);
        const cpr = (rounds && rounds > 0) ? `<span class="sb-pex-util-cpr">${cprVal.toFixed(2)}/r</span>` : '';
        rightHtml = `<span class="sb-pex-util-val">${v}</span>${cpr}`;
      }

      const descHtml = desc
        ? `<div class="sb-pex-util-desc" id="${rowId}-desc">${desc}</div>`
        : '';
      const clickAttr = desc
        ? `onclick="event.stopPropagation();var r=this;r.classList.toggle('open');"` : '';

      utilInner += `
        <div class="sb-pex-util-row" ${clickAttr} title="${desc ? 'Click for ability details' : name}">
          ${iconHtml}
          <span class="sb-pex-util-name">${name}${chargeNote}</span>
          <div class="sb-pex-util-track">
            <div class="sb-pex-util-fill" style="width:${pct}%;background:${col};opacity:.75;"></div>
          </div>
          ${rightHtml}
        </div>${descHtml}`;
    });
  } else {
    utilInner = `<div style="font-family:var(--mono);font-size:10px;color:var(--text-dim);">No ability cast data.</div>`;
  }

  const utilModeToggle = `
    <div style="display:flex;gap:3px;margin-bottom:10px;">
      <button class="mh-util-scale-btn${mhUtilMode==='raw'?' active':''}" onclick="event.stopPropagation();setMHUtilMode('raw')">CPR</button>
      <button class="mh-util-scale-btn${mhUtilMode==='charge'?' active':''}" onclick="event.stopPropagation();setMHUtilMode('charge')">CHARGE %</button>
    </div>`;

  const utilPanel = `
    <div class="sb-pex-panel util-panel">
      <div class="sb-pex-title">Utility Usage</div>
      ${utilModeToggle}
      ${utilInner}
    </div>`;

  // ── Links panel ───────────────────────────────────────────────
  // Parse name/tag from "name#tag" format
  const [playerName, playerTag] = p.name.split('#');
  const encodedRiotId = encodeURIComponent(playerName) + '%23' + (playerTag || '');
  const trackerUrl  = `https://tracker.gg/valorant/profile/riot/${encodedRiotId}`;

  const vtlUrl = `https://vtl.lol/id/${p.puuid}`;

  const linksPanel = `
    <div class="sb-pex-panel">
      <div class="sb-pex-title">Player Links</div>
      <div class="sb-pex-links">
        <a class="sb-pex-link" href="${trackerUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">

          <div class="sb-pex-link-label">

          </div>

        <a class="sb-pex-link" href="${vtlUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <span class="sb-pex-link-icon">◈</span>
          <div class="sb-pex-link-label">
            <div>vtl.lol</div>
            <div class="sb-pex-link-sub">PLAYER STATS · ${p.name}</div>
          </div>
          <span style="font-size:9px;color:var(--text-dim);opacity:.5;">↗</span>
        </a>` : `
        <div class="sb-pex-link" style="opacity:.4;cursor:default;" title="puuid required">
          <span class="sb-pex-link-icon">◈</span>
          <div class="sb-pex-link-label">
            <div>vtl.lol</div>
            <div class="sb-pex-link-sub">REQUIRES PUUID — add p.puuid to mapRow() in match_history.js</div>

      </div>
      <!-- TODO: add match-specific deep-link once match ID + player handle is confirmed to work on tracker.gg -->

  return `${statsPanel}${utilPanel}${linksPanel}`;
}

/* ── SCOREBOARD ROW ──────────────────────────────────────────── */
function sbRow(p, rounds) {
  const adrStr = p.adr != null ? p.adr : '—';
  const hsStr  = p.hs  != null ? p.hs.toFixed(1)+'%' : '—';
  const fbStr  = p.firstBloods != null ? p.firstBloods : '—';
  const fdStr  = p.firstDeaths != null ? p.firstDeaths : '—';
  const fbCls  = p.firstBloods != null ? (p.firstBloods > 0 ? 'cell-fb' : 'cell-fb zero') : '';
  const fdCls  = p.firstDeaths != null ? (p.firstDeaths > 0 ? 'cell-fd' : 'cell-fd zero') : '';

  // Party dot
  let partyDotHtml = '';
  if (p.inParty && p.partyColor) {
    const color = p.partyColor;
    partyDotHtml = `<span class="party-dot" style="background:${color};box-shadow:0 0 4px ${color};" title="Party member"></span>`;
  } else {
    partyDotHtml = `<span class="party-dot party-solo"></span>`;
  }

  // Unique row id for expand toggle
  const rowId = 'pex-' + Math.random().toString(36).slice(2,9);

  return `
    <tr class="sb-player-row ${p.you ? 'is-you' : ''}" onclick="togglePlayerExpand('${rowId}',this)">
      <td>
        <div class="sb-player-cell">
          ${partyDotHtml}
          ${agentCell(p)}
          <div>
            <div class="sb-player-name ${p.you?'you':''}">${p.name}<span style="font-size:8px;color:var(--text-dim);margin-left:6px;opacity:.5;">▶</span></div>
            <div class="sb-agent-name">${p.agent}</div>
          </div>
          ${rankBadge(p.rank, p.rankFull)}
        </div>
      </td>
      <td class="sb-kda">${p.kda}</td>
      <td class="util-cell">${utilChips(p.abilityCasts)}</td>
      <td class="sb-acs-val">${p.acs}</td>
      <td>${adrStr}</td>
      <td class="${hsClass(p.hs)}">${hsStr}</td>
      <td class="${fbCls}">${fbStr}</td>
      <td class="${fdCls}">${fdStr}</td>
    </tr>
    <tr class="sb-pex-row" id="${rowId}">
      <td colspan="8"><div class="sb-pex-content">${buildPlayerPanel(p, rounds)}</div></td>
    </tr>`;
}


/* ── RENDER SCOREBOARD ───────────────────────────────────────── */
function renderScoreboard(m) {
  const sb = m.scoreboard;
  if (!sb.blue.length && !sb.red.length) {
    return `<div style="padding:24px;font-family:var(--mono);font-size:11px;color:var(--text-dim);text-align:center;">
      Full scoreboard not available for this match.</div>`;
  }

  const blueLabel = m.result === 'win'
    ? `<span style="color:var(--win);font-size:11px;font-family:var(--display);font-weight:700;">WON · ${m.scoreUs}</span>`
    : `<span style="color:var(--text-dim);font-size:11px;">LOST · ${m.scoreUs}</span>`;
  const redLabel = m.result === 'loss'
    ? `<span style="color:var(--win);font-size:11px;font-family:var(--display);font-weight:700;">WON · ${m.scoreThem}</span>`
    : `<span style="color:var(--text-dim);font-size:11px;">LOST · ${m.scoreThem}</span>`;

  const seasonStr = m.season ? m.season.toUpperCase().replace('E','E').replace('A',' · A') : '[error]';

  const thead = (teamKey) => `
    <thead>
      <tr>
        <th style="text-align:left;padding-left:22px;cursor:default;">Player</th>
        <th data-col="kda"  onclick="sortTeam('${m.id}','${teamKey}','kda',event)">KDA</th>
        <th data-col="util" onclick="sortTeam('${m.id}','${teamKey}','util',event)" title="Utility Usage">c/q/e/x</th>
        <th data-col="acs"  onclick="sortTeam('${m.id}','${teamKey}','acs',event)">ACS</th>
        <th data-col="adr"  onclick="sortTeam('${m.id}','${teamKey}','adr',event)">ADR</th>
        <th data-col="hs"   onclick="sortTeam('${m.id}','${teamKey}','hs',event)">HS%</th>
        <th data-col="fb"   onclick="sortTeam('${m.id}','${teamKey}','fb',event)" title="First Bloods">FB</th>
        <th data-col="fd"   onclick="sortTeam('${m.id}','${teamKey}','fd',event)" title="First Deaths">FD</th>
      </tr>
    </thead>`;

  return `
    <div class="sb-header">
      <div class="sb-header-stat">
        <div>MAP <span>${m.map}</span></div>
        <div>ROUNDS <span>${m.rounds}</span></div>
        <div>DURATION <span>${m.duration}</span></div>
        <div>SEASON <span>${seasonStr}</span></div>
      </div>
      <div class="sb-header-meta">
        ${m.queue    ? `<span class="meta-chip queue">${m.queue}</span>` : ''}
        ${m.patch    ? `<span class="meta-chip patch">Patch ${m.patch}</span>` : ''}
        ${m.cluster  ? `<span class="meta-chip cluster">${m.cluster}</span>` : ''}
      </div>
    </div>
    <div class="sb-team-block">
      <div class="sb-team-label blue-team"><span>Blue Team</span>${blueLabel}</div>
      <table class="sb-table sb-table-blue">
        ${thead('blue')}
        <tbody class="sb-tbody-blue">${sb.blue.map(p => sbRow(p, m.rounds)).join('')}</tbody>
      </table>
    </div>
    <div class="sb-team-block">
      <div class="sb-team-label red-team"><span>Red Team</span>${redLabel}</div>
      <table class="sb-table sb-table-red">
        ${thead('red')}
        <tbody class="sb-tbody-red">${sb.red.map(p => sbRow(p, m.rounds)).join('')}</tbody>
      </table>
    </div>`;
}

/* ── RENDER MATCH CARD ───────────────────────────────────────── */
function matchCard(m) {
  const kdaCls = kdaColor(m.kda);
  const acsCls = m.acs != null ? acsColor(m.acs) : '';
  const rrSign = m.rrDelta != null && m.rrDelta >= 0 ? '+' : '';
  const rrCls  = m.rrDelta != null && m.rrDelta >= 0 ? 'pos' : 'neg';
  const rrStr  = m.rrDelta != null ? `${rrSign}${m.rrDelta} RR` : '— RR';
  const acsStr = m.acs != null ? m.acs : '—';
  const adrStr = m.adr != null ? m.adr : '—';
  const hsStr  = m.hs  != null ? m.hs.toFixed(1)+'%' : '—';

  // Agent icon
  const agentImg = m.agentIcon
    ? `<img src="${m.agentIcon}" alt="${m.agent}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.style.display='none'">`
    : m.agentInitial;

  // Map art — use listViewIcon if available, fall back to splash, then color bg
  let mapArtContent = '';
  if (m.mapIcon) {
    mapArtContent = `<img src="${m.mapIcon}" alt="${m.map}" onerror="this.style.display='none'">`;
  } else if (m.mapSplash) {
    mapArtContent = `<img src="${m.mapSplash}" alt="${m.map}" onerror="this.style.display='none'">`;
  } else {
    mapArtContent = '';
  }

  // FB/FD on card
  const fbHtml = m.firstBloods != null
    ? `<div class="fb-badge">FB ${m.firstBloods}</div>` : '';
  const fdHtml = m.firstDeaths != null
    ? `<div class="fd-badge">FD ${m.firstDeaths}</div>` : '';

  // Meta tags (cluster, queue, patch)
  const metaItems = [];
  if (m.queue)   metaItems.push(`<span class="meta-tag" style="border-color:rgba(0,212,255,.25);color:#7ab4c8;">${m.queue}</span>`);
  if (m.patch)   metaItems.push(`<span class="meta-tag" style="border-color:rgba(255,232,77,.2);color:#a89060;">p${m.patch}</span>`);
  if (m.cluster) metaItems.push(`<span class="meta-tag" title="${m.cluster}">${m.cluster.replace('US West (N. California)','US West').replace('US East (N. Virginia)','US East').replace('(N. California)','(N. Cal)').replace('(N. Virginia)','(N. VA)')}</span>`);

  return `
    <div class="match-card ${m.result}" data-match-id="${m.id}" onclick="toggleMatch('${m.id}')">
      <div class="match-card-inner">
        <div class="match-map-art" style="--map-color:${m.mapColor}">
          ${mapArtContent}
          <div class="map-tint"></div>
          <div class="map-label">${m.map}</div>
        </div>
        <div class="match-card-body">
          <div class="match-card-top">
            <div class="match-agent">
              <div class="match-agent-icon">${agentImg}</div>
              <div class="match-agent-name">${m.agent}</div>
            </div>
            <div class="match-result-col">
              <div class="match-result">${m.result.toUpperCase()}</div>
              <div class="match-score">
                <span class="my-score">${m.scoreUs}</span>
                <span class="sep">–</span>
                <span>${m.scoreThem}</span>
              </div>
            </div>
            <div class="match-rr">
              <div class="rr-delta ${rrCls}">${rrStr}</div>
              ${m.rrAfter ? `<div class="rr-after">${m.rrAfter}</div>` : ''}
            </div>
          </div>
          <div class="match-card-bottom">
            <div class="match-stats">
              <div class="mstat">
                <div class="mstat-label">KDA</div>
                <div class="mstat-val kda ${kdaCls}">${m.kda}</div>
              </div>
              <div class="mstat">
                <div class="mstat-label">ACS</div>
                <div class="mstat-val ${acsCls}">${acsStr}</div>
              </div>
              <div class="mstat">
                <div class="mstat-label">ADR</div>
                <div class="mstat-val">${adrStr}</div>
              </div>
              <div class="mstat">
                <div class="mstat-label">HS%</div>
                <div class="mstat-val ${hsClass(m.hs)}">${hsStr}</div>
              </div>
            </div>
            <div class="match-meta-col">
              <div class="match-time">${m.time}</div>
              <div class="match-meta-tags">${metaItems.join('')}</div>
              <div class="match-links" onclick="event.stopPropagation()">
                <a class="match-link" href="https://tracker.gg/valorant/match/${m.id}" target="_blank" rel="noopener">tracker.gg</a>
                <a class="match-link" href="http://vtl.lol/match/${m.id}" target="_blank" rel="noopener">vtl.lol</a>
              </div>
              <div class="expand-chevron">▼</div>
            </div>
          </div>
        </div>
      </div>
      <div class="match-scoreboard" onclick="event.stopPropagation()">${renderScoreboard(m)}</div>
    </div>`;
}

/* ── RENDER MATCHES ──────────────────────────────────────────── */
function renderMatches() {
  const filtered = MATCHES.filter(m => {
    if (filterResult !== 'all' && m.result !== filterResult) return false;
    if (filterMap    !== 'all' && m.map    !== filterMap)    return false;
    if (filterAgent  !== 'all' && m.agent  !== filterAgent)  return false;
    if (filterQueue  !== 'all' && m.queue.toLowerCase().replace(/\s+/g,'') !== filterQueue) return false;
    if (filterAllyAgent !== 'all') {
      const allTeams = [m.scoreboard.blue, m.scoreboard.red];
      const myTeam   = allTeams.find(t => t.some(p => p.you)) || [];
      if (!myTeam.some(p => !p.you && p.agent === filterAllyAgent)) return false;
    }
    if (filterEnemyAgent !== 'all') {
      const allTeams  = [m.scoreboard.blue, m.scoreboard.red];
      const myTeam    = allTeams.find(t => t.some(p => p.you)) || [];
      const enemyTeam = allTeams.find(t => !t.some(p => p.you)) || [];
      if (!enemyTeam.length && !myTeam.length) return true;
      if (!enemyTeam.some(p => p.agent === filterEnemyAgent)) return false;
    }
    return true;
  });
  const list = document.getElementById('match-list');
  document.getElementById('match-count').textContent = filtered.length;
  list.innerHTML = filtered.length === 0
    ? `<div class="mh-empty"><div class="em-icon">◈</div>No matches found for the current filters.</div>`
    : filtered.map(matchCard).join('');
}

/* ── DATA SOURCE BADGE ───────────────────────────────────────── */
function renderSourceBadge() {
  const toolbar = document.querySelector('.mh-toolbar');
  if (!toolbar) return;
  const badge = document.createElement('div');
  badge.style.cssText = 'font-family:var(--mono);font-size:10px;display:flex;align-items:center;gap:6px;';
  if (SOURCE_META) {
    badge.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:var(--glow-green);display:inline-block;"></span>
      <span style="color:var(--green)">${SOURCE_META.name}#${SOURCE_META.tag}</span>
      <span style="color:var(--text-dim)">· ${SOURCE_META.match_count} matches · live data</span>`;
  } else {
    badge.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:var(--text-dim);display:inline-block;opacity:.5;"></span>
      <span style="color:var(--text-dim)">mock data — run generate_match_history.py to load real matches</span>`;
  }
  toolbar.appendChild(badge);
}

/* ── UTIL MODE TOGGLE ────────────────────────────────────────── */
// Rebuilds ALL open player panels when the global util display mode changes.
function rebuildOnePexContent(pexContent) {
  const pexRow = pexContent.closest('tr.sb-pex-row');
  if (!pexRow) return;
  const card = pexRow.closest('.match-card');
  if (!card) return;
  const m = MATCHES.find(x => x.id === card.dataset.matchId);
  if (!m) return;
  const playerRow = pexRow.previousElementSibling;
  if (!playerRow) return;
  const playerName = playerRow.querySelector('.sb-player-name')?.textContent?.replace(/▶/g,'').trim();
  if (!playerName) return;
  const allPlayers = [...(m.scoreboard.blue||[]), ...(m.scoreboard.red||[])];
  const player = allPlayers.find(pl => pl.name === playerName);
  if (!player) return;
  pexContent.innerHTML = buildPlayerPanel(player, m.rounds);
}

function setMHUtilMode(mode) {
  mhUtilMode = mode;
  // Rebuild all currently-open player expand panels so bars/mode reflect the change
  document.querySelectorAll('tr.sb-pex-row.open .sb-pex-content').forEach(rebuildOnePexContent);
}

/* ── INIT ────────────────────────────────────────────────────── */
initSidebar();
initSelects();
renderSourceBadge();
renderMatches();
</script>
</body>
</html>
